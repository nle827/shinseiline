<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Shinsei Line</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=IBM+Plex+Mono:wght@400&display=swap">
  <link rel="stylesheet" href="shinsei-preview.css">
  <link rel="stylesheet" href="shinsei-home.css">
</head>
<body class="home-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="shop.html" class="nav-link">Shop</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </nav>
      <button class="hamburger-btn" aria-label="Menu" aria-expanded="false" onclick="toggleMobileNav()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a href="index.html" class="header-logo">
        <img src="assets/SHINSEI_LINE_LOGO_PNG-01.png" alt="Shinsei Line" class="logo-img">
      </a>
      <div class="header-actions">
        <button class="search-trigger" aria-label="Search" onclick="toggleSearch()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
        </button>
        <button class="cart-trigger" onclick="toggleCart()">Cart <span class="cart-count"></span></button>
      </div>
    </div>
    <div class="header-line-stripe" aria-hidden="true"></div>
  </header>

  <!-- MOBILE NAV OVERLAY -->
  <div class="mobile-nav-overlay" id="mobile-nav" aria-hidden="true">
    <nav class="mobile-nav-links">
      <a href="index.html" class="mobile-nav-link" onclick="toggleMobileNav()">Home</a>
      <a href="about.html" class="mobile-nav-link" onclick="toggleMobileNav()">About</a>
      <a href="shop.html" class="mobile-nav-link" onclick="toggleMobileNav()">Shop</a>
      <a href="contact.html" class="mobile-nav-link active" onclick="toggleMobileNav()">Contact</a>
    </nav>
  </div>

  <main id="main-content">
    <section class="contact-page">
      <div class="contact-inner">

        <div class="contact-header">
          <h1 class="contact-heading">Contact</h1>
        </div>

        <div class="contact-info">
          <a href="mailto:shinseilineofficial@gmail.com" class="contact-email">shinseilineofficial@gmail.com</a>
        </div>

        <form class="contact-form" onsubmit="handleContactSubmit(event)">
          <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" autocomplete="name" required>
          </div>
          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          <div class="form-field">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-field">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <button type="submit" class="btn btn--secondary" style="align-self: center; min-width: 200px;">Send message</button>
        </form>

      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="policy.html">Policy</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-brand">
      </div>
      <div class="footer-meta">
        <span>© 2026 Shinsei Line. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-panel">
      <div class="cart-panel-header">
        <span class="cart-panel-title">CART</span>
        <button class="cart-close" onclick="toggleCart()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
      <div class="cart-panel-body">
        <div class="cart-empty">
          <p>YOUR CART IS EMPTY</p>
          <a href="product.html" class="btn cart-browse-btn">BROWSE LINES</a>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH OVERLAY -->
  <div class="search-overlay" id="search-overlay">
    <button class="search-overlay-close" onclick="toggleSearch()">Close</button>
    <div class="search-overlay-inner">
      <form class="search-overlay-form" onsubmit="submitSearch(event)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
        <input type="text" id="search-overlay-input" placeholder="Search products..." autocomplete="off">
        <button type="submit" aria-label="Submit search">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="7" x2="13" y2="7"/><polyline points="7,1 13,7 7,13"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script src="shinsei-preview.js"></script>
  <script src="shinsei-home.js"></script>
</body>
</html>
