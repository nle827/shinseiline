<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinsei Line — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=IBM+Plex+Mono:wght@400&display=swap">
  <link rel="stylesheet" href="shinsei-preview.css">
  <link rel="stylesheet" href="shinsei-home.css">
</head>
<body class="home-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="shop.html" class="nav-link">Shop</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button class="hamburger-btn" aria-label="Menu" aria-expanded="false" onclick="toggleMobileNav()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a href="index.html" class="header-logo">
        <img src="assets/SHINSEI_LINE_LOGO_PNG-01.png" alt="Shinsei Line" class="logo-img">
      </a>
      <div class="header-actions">
        <button class="search-trigger" aria-label="Search" onclick="toggleSearch()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
        </button>
        <button class="cart-trigger" onclick="toggleCart()">Cart <span class="cart-count"></span></button>
      </div>
    </div>
    <div class="header-line-stripe" aria-hidden="true"></div>
  </header>

  <!-- MOBILE NAV OVERLAY -->
  <div class="mobile-nav-overlay" id="mobile-nav" aria-hidden="true">
    <nav class="mobile-nav-links">
      <a href="index.html" class="mobile-nav-link active" onclick="toggleMobileNav()">Home</a>
      <a href="about.html" class="mobile-nav-link" onclick="toggleMobileNav()">About</a>
      <a href="shop.html" class="mobile-nav-link" onclick="toggleMobileNav()">Shop</a>
      <a href="contact.html" class="mobile-nav-link" onclick="toggleMobileNav()">Contact</a>
    </nav>
  </div>

  <main id="main-content">

    <!-- HERO STAGE -->
    <div class="hero-stage">

      <!-- City clock: Los Angeles -->
      <div class="city-clock" id="clock-los">
        <svg class="clock-face" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1"/>
          <line class="clock-hand-h" x1="24" y1="24" x2="24" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line class="clock-hand-m" x1="24" y1="24" x2="24" y2="7"  stroke="currentColor" stroke-width="1"   stroke-linecap="round"/>
          <line class="clock-hand-s" x1="24" y1="24" x2="24" y2="5"  stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="1.5" fill="currentColor"/>
        </svg>
        <span class="city-clock-label">LOS</span>
        <span class="city-clock-time" id="time-los"></span>
        <span class="city-clock-date" id="date-los"></span>
      </div>

      <!-- HERO -->
      <section class="hero">
        <img class="hero-mobile-img" src="assets/Gemini_Generated_Image_ooyxwbooyxwbooyx.png" alt="Kagemi" aria-hidden="true">
        <div class="hero-overlay-text">
          <h1 class="hero-heading">KAGEMI</h1>
          <div class="hero-overlay-rule" aria-hidden="true"></div>
          <p class="hero-subline">LINE 01 / LONG OVERCOAT / SS26</p>
        </div>
      </section><!-- /.hero -->

      <!-- City clock: Tokyo -->
      <div class="city-clock" id="clock-tyo">
        <svg class="clock-face" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1"/>
          <line class="clock-hand-h" x1="24" y1="24" x2="24" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line class="clock-hand-m" x1="24" y1="24" x2="24" y2="7"  stroke="currentColor" stroke-width="1"   stroke-linecap="round"/>
          <line class="clock-hand-s" x1="24" y1="24" x2="24" y2="5"  stroke="currentColor" stroke-width="0.5" stroke-linecap="round"/>
          <circle cx="24" cy="24" r="1.5" fill="currentColor"/>
        </svg>
        <span class="city-clock-label">TYO</span>
        <span class="city-clock-time" id="time-tyo"></span>
        <span class="city-clock-date" id="date-tyo"></span>
      </div>

    </div><!-- /.hero-stage -->

    <!-- LINE SELECTOR -->
    <div class="line-selector" role="tablist" aria-label="Select a line">
      <div class="line-selector-inner">

        <!-- Track -->
        <div class="ls-track" aria-hidden="true">
          <div class="ls-track-fill"></div>
        </div>

        <!-- Node: SHOT 01 -->
        <button class="ls-node ls-node--active" role="tab" aria-selected="true" data-line="01" data-name="KAGEMI" data-sub="LINE 01 / LONG OVERCOAT / SS26" data-img="assets/kagemi mockup.png" data-hero="assets/Gemini_Generated_Image_ooyxwbooyxwbooyx.png" data-hero-mobile="assets/Gemini_Generated_Image_ooyxwbooyxwbooyx.png">
          <div class="ls-node-ring" aria-hidden="true"></div>
          <div class="ls-node-dot" aria-hidden="true"></div>
          <div class="ls-node-label">
            <span class="ls-node-id">01</span>
            <span class="ls-node-name">KAGEMI</span>
          </div>
        </button>

        <!-- Chevron -->
        <div class="ls-chevron" aria-hidden="true">»</div>

        <!-- Node: SHOT 02 -->
        <button class="ls-node" role="tab" aria-selected="false" data-line="02" data-name="KAGEMI" data-sub="LINE 01 / CONSTRUCTION / FRONT" data-img="assets/AI MOCKUP.png" data-hero="assets/AI MOCKUP.png" data-hero-mobile="assets/AI MOCKUP.png">
          <div class="ls-node-dot" aria-hidden="true"></div>
          <div class="ls-node-label">
            <span class="ls-node-id">02</span>
            <span class="ls-node-name">KAGEMI</span>
          </div>
        </button>

        <!-- Chevron -->
        <div class="ls-chevron" aria-hidden="true">»</div>

        <!-- Node: SHOT 03 -->
        <button class="ls-node" role="tab" aria-selected="false" data-line="03" data-name="KAGEMI" data-sub="LINE 01 / STORE CONCEPT / SS26" data-img="assets/Shinsei Line Store Concept.png" data-hero="assets/Shinsei Line Store Concept.png" data-hero-mobile="assets/Shinsei Line Store Concept.png">
          <div class="ls-node-dot" aria-hidden="true"></div>
          <div class="ls-node-label">
            <span class="ls-node-id">03</span>
            <span class="ls-node-name">KAGEMI</span>
          </div>
        </button>

      </div>
    </div><!-- /.line-selector -->

    <!-- PRODUCT LINES -->
    <section class="featured-product product-lines-section">
      <div class="product-lines-inner">

        <div class="lines-header">
          <span class="lines-header-label">CURRENT LINES</span>
          <span class="lines-header-status">01 ACTIVE</span>
        </div>

        <div class="lines-grid">

          <!-- CARD 1 — LINE 01 ACTIVE -->
          <div class="line-card line-card--active">
            <a href="product.html?img=assets%2Fkagemi%20mockup.png" class="line-card-media card-gallery" data-current="0" style="display:block;" data-product-image="assets/kagemi mockup.png">
              <img src="assets/kagemi mockup.png" alt="Kagemi — The Structured Overcoat" class="line-card-img card-gallery-img card-gallery-img--active" draggable="false">
              <img src="assets/Gemini_Generated_Image_wum8wwum8wwum8ww.png" alt="Kagemi — Detail" class="line-card-img card-gallery-img" draggable="false">
              <div class="card-gallery-track" aria-hidden="true">
                <div class="card-gallery-rail">
                  <div class="card-gallery-node card-gallery-node--active" data-index="0"></div>
                  <div class="card-gallery-node" data-index="1"></div>
                </div>
              </div>
            </a>
            <div class="line-card-body">
              <div class="line-card-body-meta">
                <span class="line-card-name">Kagemi</span>
                <span class="line-card-price">$485.00</span>
              </div>
              <a href="product.html?img=assets%2Fkagemi%20mockup.png" class="line-card-cta">VIEW NOW</a>
            </div>
          </div>

          <!-- CARD 2 — LINE 02 -->
          <div class="line-card line-card--upcoming">
            <a href="product.html?available=false" class="line-card-media" style="display:block;">
            </a>
            <div class="line-card-body">
              <div class="line-card-body-meta">
                <span class="line-card-name">———</span>
                <span class="line-card-price">$—</span>
              </div>
              <a href="product.html?available=false" class="line-card-cta line-card-cta--disabled">PREVIEW</a>
            </div>
          </div>

          <!-- CARD 3 — LINE 03 -->
          <div class="line-card line-card--locked">
            <a href="product.html?available=soldout" class="line-card-media" style="display:flex; min-height:300px;"></a>
            <div class="line-card-body">
              <div class="line-card-body-meta">
                <span class="line-card-name">———</span>
                <span class="line-card-price">$—</span>
              </div>
              <a href="product.html?available=soldout" class="line-card-cta line-card-cta--disabled">PREVIEW</a>
            </div>
          </div>

        </div><!-- /.lines-grid -->
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="policy.html">Policy</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-brand">
      </div>
      <div class="footer-meta">
        <span>© 2026 Shinsei Line. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-panel">
      <div class="cart-panel-header">
        <span class="cart-panel-title">CART</span>
        <button class="cart-close" onclick="toggleCart()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
      <div class="cart-panel-body">
        <div class="cart-empty">
          <p>YOUR CART IS EMPTY</p>
          <a href="product.html" class="btn cart-browse-btn">BROWSE LINES</a>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH OVERLAY -->
  <div class="search-overlay" id="search-overlay">
    <button class="search-overlay-close" onclick="toggleSearch()">Close</button>
    <div class="search-overlay-inner">
      <form class="search-overlay-form" onsubmit="submitSearch(event)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
        <input type="text" id="search-overlay-input" placeholder="Search products..." autocomplete="off">
        <button type="submit" aria-label="Submit search">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="7" x2="13" y2="7"/><polyline points="7,1 13,7 7,13"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script src="shinsei-preview.js"></script>
  <script src="shinsei-home.js"></script>
</body>
</html>
