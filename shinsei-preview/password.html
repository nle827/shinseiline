<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinsei Line — Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #FAFAFA;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scan {
      0% {
        left: -100%;
      }
      50% {
        left: 100%;
      }
      100% {
        left: -100%;
      }
    }

    @keyframes pulse {
      0%, 100% {
        background: #2e2e2e;
      }
      50% {
        background: #5a5a5a;
      }
    }

    .password-page-wrapper {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FAFAFA;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .password-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .password-wordmark {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }

    .password-wordmark img {
      width: auto;
      height: 64px;
      display: block;
    }



    .year-tag {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeIn 1.8s ease forwards;
      animation-delay: 1.4s;
      opacity: 0;
    }

    .year-tag-rule {
      width: 40px;
      height: 2px;
      background-color: #2a2a2a;
      position: relative;
      overflow: hidden;
    }

    .year-tag-rule::after {
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 1px;
      background: #5a5a5a;
      animation: scan 3.2s ease-in-out infinite;
      animation-delay: 2.4s;
      content: '';
    }

    .dot-group {
      display: flex;
      flex-direction: row;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #2e2e2e;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .dot:nth-child(1) {
      animation-delay: 2.6s;
    }

    .dot:nth-child(2) {
      animation-delay: 2.9s;
    }

    .dot:nth-child(3) {
      animation-delay: 3.2s;
    }

    .year-text {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3a3a3a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      line-height: 1;
    }

    @media (max-width: 640px) {
      .password-wordmark img {
        height: 48px;
      }
    }

    @media (max-width: 480px) {
      .password-wordmark img {
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="password-page-wrapper">
    <div class="password-content">
      <div class="password-wordmark">
        <img 
          src="assets/SHINSEI_LINE_LOGO_PNG-01.png" 
          alt="Shinsei Line" 
          width="auto" 
          height="64"
        >
      </div>

      <div class="year-tag">
        <div class="year-tag-rule"></div>
        <div class="dot-group">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="year-text">2026</div>
        <div class="dot-group">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="year-tag-rule"></div>
      </div>
    </div>
  </div>
</body>
</html>
