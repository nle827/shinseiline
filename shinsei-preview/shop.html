<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Shinsei Line</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=IBM+Plex+Mono:wght@400&display=swap">
  <link rel="stylesheet" href="shinsei-preview.css">
  <link rel="stylesheet" href="shinsei-home.css">
  <style>
    /* ── Shop page layout ── */
    .shop-page {
      padding: calc(var(--header-h) + var(--space-md)) var(--space-md) var(--space-xl);
      max-width: 1280px;
      margin: 0 auto;
    }

    .shop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
      gap: var(--space-md);
    }

    .shop-title {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    /* Search bar */
    .shop-search {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      padding: 8px 14px;
      gap: 10px;
      flex: 0 0 300px;
    }

    .shop-search svg {
      color: var(--text-ghost);
      flex-shrink: 0;
    }

    .shop-search input {
      border: none;
      outline: none;
      background: transparent;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-primary);
      width: 100%;
    }

    .shop-search input::placeholder {
      color: var(--text-ghost);
    }

    /* Result count */
    .shop-count {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-ghost);
      white-space: nowrap;
    }

    /* Main layout: filters + grid */
    .shop-body {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: var(--space-lg);
      align-items: start;
    }

    /* ── Filters sidebar ── */
    .shop-filters {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .filter-group {
      border-bottom: 1px solid var(--border);
    }

    .filter-group-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .filter-group-trigger .filter-icon {
      font-size: 14px;
      line-height: 1;
      color: var(--text-ghost);
      transition: transform 0.3s;
    }

    .filter-group.open .filter-icon {
      transform: rotate(45deg);
    }

    .filter-group-body {
      display: none;
      padding-bottom: 14px;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group.open .filter-group-body {
      display: flex;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .filter-option input[type="checkbox"] {
      appearance: none;
      width: 12px;
      height: 12px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      position: relative;
    }

    .filter-option input[type="checkbox"]:checked {
      background: var(--text-primary);
      border-color: var(--text-primary);
    }

    .filter-option input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 3px;
      width: 4px;
      height: 7px;
      border: 1.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .filter-option label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .filter-size-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .filter-size-btn {
      padding: 6px 0;
      border: 1px solid var(--border);
      background: none;
      font-family: var(--font-ui);
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .filter-size-btn.active,
    .filter-size-btn:hover {
      background: var(--text-primary);
      color: #fff;
      border-color: var(--text-primary);
    }

    .filter-price-range {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .filter-price-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-price-inputs input {
      width: 70px;
      border: 1px solid var(--border);
      padding: 6px 8px;
      background: none;
      outline: none;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text-primary);
    }

    .filter-price-inputs span {
      font-family: var(--font-ui);
      font-size: 9px;
      color: var(--text-ghost);
    }

    .filter-clear {
      margin-top: var(--space-sm);
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-ui);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-ghost);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .filter-clear:hover {
      color: var(--text-primary);
    }

    /* ── Product grid ── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      align-items: start;
    }

    .shop-card {
      display: flex;
      flex-direction: column;
      gap: 0;
      cursor: pointer;
    }

    .shop-card-media {
      aspect-ratio: 3/4;
      background: #F0F0F0;
      overflow: hidden;
      position: relative;
    }

    .shop-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0,0,0.2,1);
      display: block;
    }

    .shop-card:hover .shop-card-media img {
      transform: scale(1.03);
    }

    .shop-card-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      font-family: var(--font-ui);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-ghost);
      background: rgba(250,250,250,0.9);
      padding: 3px 8px;
    }

    .shop-card-body {
      padding: 12px 0 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .shop-card-meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .shop-card-name {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .shop-card-price {
      font-family: var(--font-ui);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--text-primary);
    }

    .shop-card-sub {
      font-family: var(--font-ui);
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-ghost);
    }

    /* Empty state */
    .shop-empty {
      grid-column: 1 / -1;
      padding: var(--space-xl) 0;
      text-align: center;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-ghost);
    }

    /* Sort control */
    .shop-sort {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shop-sort label {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-ghost);
    }

    .shop-sort select {
      border: 1px solid var(--border);
      background: none;
      padding: 6px 10px;
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .shop-body { grid-template-columns: 1fr; }
      .shop-filters { flex-direction: row; flex-wrap: wrap; gap: var(--space-sm); border-top: none; }
      .filter-group { border-bottom: none; }
      .shop-grid { grid-template-columns: repeat(2, 1fr); }
      .shop-header { flex-wrap: wrap; }
      .shop-search { flex: 1 1 100%; }
    }

    @media (max-width: 480px) {
      .shop-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="home-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="shop.html" class="nav-link active">Shop</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>
      <button class="hamburger-btn" aria-label="Menu" aria-expanded="false" onclick="toggleMobileNav()">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <a href="index.html" class="header-logo">
        <img src="assets/SHINSEI_LINE_LOGO_PNG-01.png" alt="Shinsei Line" class="logo-img">
      </a>
      <div class="header-actions">
        <button class="search-trigger" aria-label="Search" onclick="toggleSearch()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
        </button>
        <button class="cart-trigger" onclick="toggleCart()">Cart <span class="cart-count"></span></button>
      </div>
    </div>
    <div class="header-line-stripe" aria-hidden="true"></div>
  </header>

  <!-- MOBILE NAV OVERLAY -->
  <div class="mobile-nav-overlay" id="mobile-nav" aria-hidden="true">
    <nav class="mobile-nav-links">
      <a href="index.html" class="mobile-nav-link" onclick="toggleMobileNav()">Home</a>
      <a href="about.html" class="mobile-nav-link" onclick="toggleMobileNav()">About</a>
      <a href="shop.html" class="mobile-nav-link active" onclick="toggleMobileNav()">Shop</a>
      <a href="contact.html" class="mobile-nav-link" onclick="toggleMobileNav()">Contact</a>
    </nav>
  </div>

  <main id="main-content">
    <div class="shop-page">

      <!-- Top bar: title + search + sort -->
      <div class="shop-header">
        <span class="shop-title">All Lines</span>
        <div class="shop-search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
          <input type="text" id="shop-search-input" placeholder="Search" oninput="filterProducts()">
        </div>
        <div class="shop-sort">
          <label for="shop-sort-select">Sort</label>
          <select id="shop-sort-select" onchange="filterProducts()">
            <option value="default">Featured</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A–Z</option>
          </select>
        </div>
        <span class="shop-count" id="shop-count">1 product</span>
      </div>

      <div class="shop-body">

        <!-- Filters sidebar -->
        <aside class="shop-filters" id="shop-filters">

          <div class="filter-group open" id="filter-lines">
            <button class="filter-group-trigger" onclick="toggleFilter(this)">
              <span>Shinsei Lines</span>
              <span class="filter-icon">+</span>
            </button>
            <div class="filter-group-body">
              <div class="filter-option">
                <input type="checkbox" id="line-001" value="001" onchange="filterProducts()" checked>
                <label for="line-001">Line 001</label>
              </div>
            </div>
          </div>

          <div class="filter-group open" id="filter-category">
            <button class="filter-group-trigger" onclick="toggleFilter(this)">
              <span>Category</span>
              <span class="filter-icon">+</span>
            </button>
            <div class="filter-group-body">
              <div class="filter-option">
                <input type="checkbox" id="cat-outerwear" value="outerwear" onchange="filterProducts()" checked>
                <label for="cat-outerwear">Outerwear</label>
              </div>
            </div>
          </div>

          <div class="filter-group open" id="filter-size">
            <button class="filter-group-trigger" onclick="toggleFilter(this)">
              <span>Size</span>
              <span class="filter-icon">+</span>
            </button>
            <div class="filter-group-body">
              <div class="filter-size-grid">
                <button class="filter-size-btn" onclick="toggleSizeFilter(this)">XS</button>
                <button class="filter-size-btn" onclick="toggleSizeFilter(this)">S</button>
                <button class="filter-size-btn" onclick="toggleSizeFilter(this)">M</button>
                <button class="filter-size-btn" onclick="toggleSizeFilter(this)">L</button>
                <button class="filter-size-btn" onclick="toggleSizeFilter(this)">XL</button>
              </div>
            </div>
          </div>

          <div class="filter-group" id="filter-price">
            <button class="filter-group-trigger" onclick="toggleFilter(this)">
              <span>Price</span>
              <span class="filter-icon">+</span>
            </button>
            <div class="filter-group-body">
              <div class="filter-price-range">
                <div class="filter-price-inputs">
                  <input type="number" id="price-min" placeholder="Min" min="0" oninput="filterProducts()">
                  <span>—</span>
                  <input type="number" id="price-max" placeholder="Max" min="0" oninput="filterProducts()">
                </div>
              </div>
            </div>
          </div>

          <button class="filter-clear" onclick="clearFilters()">Clear all filters</button>

        </aside>

        <!-- Product grid -->
        <div class="shop-grid" id="shop-grid">

          <a href="product.html?img=assets%2Fkagemi%20mockup.png" class="shop-card"
            data-name="Kagemi"
            data-category="outerwear"
            data-line="001"
            data-price="485"
            data-sizes="xs,s,m,l,xl"
            data-product-image="assets/kagemi mockup.png">
            <div class="shop-card-media">
              <img src="assets/kagemi mockup.png" alt="Kagemi — The Structured Overcoat">
              <span class="shop-card-badge">No. 001</span>
            </div>
            <div class="shop-card-body">
              <div class="shop-card-meta">
                <span class="shop-card-name">Kagemi</span>
                <span class="shop-card-price">$485.00</span>
              </div>
              <span class="shop-card-sub">Outerwear — Unisex</span>
            </div>
          </a>

          <!-- Placeholder cards — upcoming -->
          <a href="product.html?available=false" class="shop-card"
            data-name="———"
            data-category=""
            data-price="0"
            data-sizes="">
            <div class="shop-card-media" style="background:#EBEBEB;">
              <span class="shop-card-badge">Announced 2026</span>
            </div>
            <div class="shop-card-body">
              <div class="shop-card-meta">
                <span class="shop-card-name">———</span>
                <span class="shop-card-price">$—</span>
              </div>
              <span class="shop-card-sub">Not yet available</span>
            </div>
          </a>

          <a href="product.html?available=soldout" class="shop-card"
            data-name="———"
            data-category=""
            data-price="0"
            data-sizes="">
            <div class="shop-card-media" style="background:#EBEBEB;">
              <span class="shop-card-badge">Sold Out</span>
            </div>
            <div class="shop-card-body">
              <div class="shop-card-meta">
                <span class="shop-card-name">———</span>
                <span class="shop-card-price">$—</span>
              </div>
              <span class="shop-card-sub">Sold out</span>
            </div>
          </a>

        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="policy.html">Policy</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="footer-brand">
      </div>
      <div class="footer-meta">
        <span>© 2026 Shinsei Line. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-panel">
      <div class="cart-panel-header">
        <span class="cart-panel-title">CART</span>
        <button class="cart-close" onclick="toggleCart()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
      <div class="cart-panel-body" id="cart-body">
        <div class="cart-empty">
          <p>YOUR CART IS EMPTY</p>
          <a href="shop.html" class="btn cart-browse-btn">BROWSE LINES</a>
        </div>
      </div>
    </div>
  </div>

  <!-- SEARCH OVERLAY -->
  <div class="search-overlay" id="search-overlay">
    <button class="search-overlay-close" onclick="toggleSearch()">Close</button>
    <div class="search-overlay-inner">
      <form class="search-overlay-form" onsubmit="submitSearch(event)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
        <input type="text" id="search-overlay-input" placeholder="Search products..." autocomplete="off">
        <button type="submit" aria-label="Submit search">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="0" y1="7" x2="13" y2="7"/><polyline points="7,1 13,7 7,13"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script src="shinsei-preview.js"></script>
  <script src="shinsei-home.js"></script>
  <script>
    function toggleFilter(btn) {
      const group = btn.closest('.filter-group');
      group.classList.toggle('open');
    }

    function toggleSizeFilter(btn) {
      btn.classList.toggle('active');
      filterProducts();
    }

    function filterProducts() {
      const query = document.getElementById('shop-search-input').value.toLowerCase();
      const sort = document.getElementById('shop-sort-select').value;
      const minPrice = parseFloat(document.getElementById('price-min').value) || 0;
      const maxPrice = parseFloat(document.getElementById('price-max').value) || Infinity;

      const checkedCategories = Array.from(
        document.querySelectorAll('#filter-category input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      const checkedLines = Array.from(
        document.querySelectorAll('#filter-lines input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      const activeSizes = Array.from(
        document.querySelectorAll('.filter-size-btn.active')
      ).map(btn => btn.textContent.toLowerCase());

      const grid = document.getElementById('shop-grid');
      const cards = Array.from(grid.querySelectorAll('.shop-card'));

      let visible = cards.filter(card => {
        const name = (card.dataset.name || '').toLowerCase();
        const category = (card.dataset.category || '').toLowerCase();
        const price = parseFloat(card.dataset.price) || 0;
        const sizes = (card.dataset.sizes || '').split(',');

        // Placeholders always show
        if (!card.dataset.category) return true;

        const matchesSearch = !query || name.includes(query);
        const matchesCategory = checkedCategories.length === 0 || checkedCategories.includes(category);
        const matchesLine = checkedLines.length === 0 || checkedLines.includes(card.dataset.line || '');
        const matchesPrice = price === 0 || (price >= minPrice && price <= maxPrice);
        const matchesSize = activeSizes.length === 0 || activeSizes.some(s => sizes.includes(s));

        return matchesSearch && matchesCategory && matchesLine && matchesPrice && matchesSize;
      });

      // Sort
      if (sort === 'price-asc') {
        visible.sort((a, b) => parseFloat(a.dataset.price) - parseFloat(b.dataset.price));
      } else if (sort === 'price-desc') {
        visible.sort((a, b) => parseFloat(b.dataset.price) - parseFloat(a.dataset.price));
      } else if (sort === 'name-asc') {
        visible.sort((a, b) => a.dataset.name.localeCompare(b.dataset.name));
      }

      // Re-render
      cards.forEach(card => card.style.display = 'none');
      visible.forEach(card => {
        card.style.display = '';
        grid.appendChild(card);
      });

      // Count (only real products)
      const realCount = visible.filter(c => c.dataset.category).length;
      const countEl = document.getElementById('shop-count');
      countEl.textContent = realCount === 1 ? '1 product' : `${realCount} products`;

      // Empty state
      let emptyEl = grid.querySelector('.shop-empty');
      if (realCount === 0 && visible.length === 0) {
        if (!emptyEl) {
          emptyEl = document.createElement('div');
          emptyEl.className = 'shop-empty';
          emptyEl.textContent = 'No products match your filters.';
          grid.appendChild(emptyEl);
        }
      } else if (emptyEl) {
        emptyEl.remove();
      }
    }

    function clearFilters() {
      document.getElementById('shop-search-input').value = '';
      document.getElementById('price-min').value = '';
      document.getElementById('price-max').value = '';
      document.querySelectorAll('#filter-category input[type="checkbox"]').forEach(cb => { cb.checked = false; });
      document.querySelectorAll('#filter-lines input[type="checkbox"]').forEach(cb => { cb.checked = false; });
      document.querySelectorAll('.filter-size-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('shop-sort-select').value = 'default';
      filterProducts();
    }
  </script>
</body>
</html>
